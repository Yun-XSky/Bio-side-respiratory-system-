<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 8: Respiratory Systems in Humans and Animals</title>
    <!-- Tailwind CSS for styling, perfect for Github Pages (no build step) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tab-btn { transition: all 0.3s ease; }
        .tab-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .tab-content { display: none; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Animation paths for SVG */
        .gas-o2 { fill: #3b82f6; }
        .gas-co2 { fill: #ef4444; }
        .water-flow { fill: #06b6d4; opacity: 0.7; }
        
        /* Subtle continuous pulse for the frog lungs */
        @keyframes breathe {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .lung-breathe { transform-origin: 320px 240px; animation: breathe 3s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">

                <!-- Figure 8.1: Insect -->

                        <defs>

                            <path id="tracheaPathBack" d="M 600,280 L 480,280 L 350,180 L 220,180" />
                        </defs>
                        
                        <!-- The Organism: Grasshopper Outline -->
                        <g opacity="0.15">
                            <path d="M 100,200 Q 150,150 250,140 Q 400,120 500,150 Q 550,180 500,220 Q 300,250 200,240 Q 120,230 100,200 Z" fill="#15803d" />
                            <path d="M 120,180 Q 80,150 60,100" fill="none" stroke="#15803d" stroke-width="4" /> <!-- Antenna -->
                            <path d="M 350,230 Q 400,350 450,380 L 550,380" fill="none" stroke="#15803d" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" /> <!-- Leg -->
                        </g>

                        <text x="300" y="40" font-size="20" font-weight="bold" fill="#334155">Respiratory System of an Insect (Grasshopper)</text>

                        <!-- Macroscopic View: Tracheal System in Body -->
                        <g transform="translate(0, 0)">

                            <circle cx="220" cy="180" r="6" fill="#475569" />

                            <path d="M 220,180 L 220,150 M 280,185 L 280,155 M 340,188 L 340,160" stroke="#cbd5e1" stroke-width="4" fill="none"/>

                            <!-- Air Sacs -->
                            <ellipse cx="250" cy="160" rx="15" ry="10" fill="#bae6fd" stroke="#38bdf8" stroke-width="1.5" />

                        <!-- Connecting line to Zoom -->

                            <!-- Trachea (Chitin rings) -->
                            <rect x="150" y="260" width="150" height="40" fill="#fff" stroke="#64748b" stroke-width="3" />

                                <line x1="240" y1="260" x2="240" y2="300" /><line x1="260" y1="260" x2="260" y2="300" />

                            <!-- Tracheole Branches -->

                            <path d="M 300,300 L 450,330 L 550,330" fill="none" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
                            
                            <!-- Fluid in tracheole -->
                            <ellipse cx="500" cy="240" rx="30" ry="8" fill="#bae6fd" opacity="0.8" />
                            <ellipse cx="500" cy="330" rx="30" ry="8" fill="#bae6fd" opacity="0.8" />

                            <polygon points="530,300 650,300 670,360 550,360" fill="#fca5a5" stroke="#ef4444" stroke-width="2" />

                        <g font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f172a">

                            <text x="320" y="110">Air sac</text>
                            <line x1="320" y1="120" x2="310" y2="150" stroke="#0f172a" stroke-width="1.5" />

                            <text x="150" y="280">Trachea</text>
                            <text x="200" y="380">Chitin rings</text>
                            <line x1="220" y1="365" x2="240" y2="340" stroke="#0f172a" stroke-width="1.5" />

                        <!-- Animations O2 / CO2 -->

                <div id="fish" class="tab-content p-4 w-full overflow-x-auto">
                    <svg viewBox="0 0 800 500" class="w-full h-auto min-w-[700px]">
                        <defs>

                        </defs>

                        <text x="300" y="30" font-size="20" font-weight="bold" fill="#334155">Respiratory System of a Fish</text>

                        <!-- The Organism: Fish Outline & Cutaway -->
                        <g>
                            <!-- Fish Body -->
                            <path d="M 100,130 Q 200,50 350,100 Q 450,150 550,120 L 650,70 L 600,150 L 650,230 L 550,180 Q 400,220 250,200 Q 150,180 100,130 Z" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3" />
                            <circle cx="130" cy="110" r="5" fill="#000" /> <!-- Eye -->
                            <!-- Cutaway Operculum -->
                            <path d="M 150,100 Q 180,140 150,180" fill="none" stroke="#0284c7" stroke-width="4" stroke-dasharray="4,2"/>

                                <path d="M 180,120 Q 210,140 180,160" />
                            </g>
                        </g>

                        <!-- Zoom 1: Gill Arch -->

                            <rect x="0" y="0" width="220" height="230" fill="#f8fafc" rx="10" stroke="#e2e8f0" />
                            
                            <path d="M 40,30 Q 180,110 40,200" fill="none" stroke="#fef08a" stroke-width="20" stroke-linecap="round"/>
                            <path d="M 40,30 Q 180,110 40,200" fill="none" stroke="#ca8a04" stroke-width="2" stroke-linecap="round"/>
                            
                            <!-- Filaments -->
                            <g stroke="#ef4444" stroke-width="5" stroke-linecap="round">
                                <line x1="70" y1="45" x2="180" y2="40" /> <line x1="100" y1="65" x2="200" y2="60" />
                                <line x1="120" y1="85" x2="210" y2="90" /> <line x1="135" y1="110" x2="220" y2="120" />
                                <line x1="135" y1="140" x2="210" y2="155" /><line x1="110" y1="165" x2="180" y2="185" />
                                <line x1="70" y1="185" x2="130" y2="205" />
                            </g>
                        </g>

                        <!-- Zoom lines -->
                        <line x1="170" y1="160" x2="100" y2="250" stroke="#94a3b8" stroke-dasharray="4,4" />
                        <line x1="200" y1="360" x2="300" y2="360" stroke="#94a3b8" stroke-dasharray="4,4" />

                        <!-- Zoom 2: Lamella (Counter-current flow) -->
                        <g transform="translate(300, 250)">
                            <rect x="0" y="0" width="480" height="230" fill="#f8fafc" rx="10" stroke="#e2e8f0" />
                            <text x="240" y="30" text-anchor="middle" font-weight="bold" fill="#334155">Lamella (Counter-current exchange)</text>
                            
                            <!-- Lamella Structure -->
                            <rect x="80" y="80" width="320" height="100" fill="#fee2e2" rx="10" stroke="#fca5a5" stroke-width="2" />
                            
                            <!-- Blood Vessel Inside -->
                            <rect x="100" y="115" width="280" height="30" fill="url(#bloodGrad)" rx="15" />

                            <path d="M 50,100 L 450,100" fill="none" stroke="#cffafe" stroke-width="25" stroke-linecap="round" opacity="0.8"/>
                            <path d="M 50,160 L 450,160" fill="none" stroke="#cffafe" stroke-width="25" stroke-linecap="round" opacity="0.8"/>
                            
                            <!-- Connecting vessels -->

                            <path d="M 380,130 L 440,130 L 440,200" fill="none" stroke="#3b82f6" stroke-width="15" stroke-linecap="round"/>

                            <!-- Direction Arrows Text -->
                            <text x="240" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#0891b2">Flow of Water (High O₂) ➡</text>
                            <text x="240" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">⬅ Flow of Blood</text>
                            
                            <text x="50" y="225" font-size="12" font-weight="bold" fill="#b91c1c">Oxygenated Blood</text>
                            <text x="320" y="225" font-size="12" font-weight="bold" fill="#1d4ed8">Deoxygenated Blood</text>
                        </g>

                        <!-- Top Labels -->
                        <g font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f172a">
                            <text x="50" y="80">Mouth</text>
                            <text x="180" y="60">Operculum</text>
                            <line x1="200" y1="65" x2="160" y2="100" stroke="#0f172a" stroke-width="1.5" />
                            
                            <text x="60" y="270">Gill arch</text>
                            <text x="190" y="270">Gill filaments</text>
                            <text x="320" y="340">Lamella</text>
                        </g>

                        <!-- Animations -->
                        <circle r="5" class="water-flow">
                            <animateMotion dur="2s" repeatCount="indefinite" path="M 10,130 L 100,130 L 140,150 L 140,190" />
                        </circle>
                        <!-- Lamella water animation -->
                        <circle r="4" class="water-flow"><animateMotion dur="3s" repeatCount="indefinite" path="M 350,350 L 750,350" /></circle>
                        <circle r="4" class="water-flow"><animateMotion dur="3s" repeatCount="indefinite" begin="1s" path="M 350,410 L 750,410" /></circle>
                        <!-- O2 diffusing from water to blood -->
                        <circle r="4" class="gas-o2">
                            <animate attributeName="cx" values="550; 600; 600" dur="2s" repeatCount="indefinite" />
                            <animate attributeName="cy" values="350; 350; 370" dur="2s" repeatCount="indefinite" />
                        </circle>
                    </svg>
                </div>
